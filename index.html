<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RaxzDownload</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Top Navigation -->
  <header class="top-nav">
    <div class="logo">RaxzDownload</div>
    <input type="text" class="search-bar" placeholder="Search movies, apps...">
  </header>

  <!-- Horizontal Menu -->
  <nav class="main-menu">
    <a href="#" data-category="all">Trending</a>
    <a href="#" data-category="Hollywood">Hollywood</a>
    <a href="#" data-category="Anime">Anime</a>
  </nav>

  <!-- Hero Banner -->
  <section class="hero">
    <div class="hero-content"></div>
  </section>

  <!-- Content Section -->
  <section class="section content-section">
    <h2>Content</h2>
    <div class="card-row"></div>
  </section>

  <!-- Profile Section -->
  <section class="section profile-section" style="display:none;">
    <h2>Your Profile</h2>
    <div class="profile-box">
      <p><strong>User Type:</strong> <span id="userTypeDisplay"></span></p>
      <p><strong>Downloads Remaining Today:</strong> <span id="downloadsRemaining"></span></p>
      <button id="upgradeBtn">Upgrade to VIP</button>
    </div>
  </section>

  <!-- Bottom Navigation -->
  <footer class="bottom-nav">
    <a href="#" id="homeNav">Home</a>
    <a href="#">Categories</a>
    <a href="#">Downloads</a>
    <a href="#" id="profileNav">Profile</a>
  </footer>

  <script src="script.js"></script>
</body>
</html>
